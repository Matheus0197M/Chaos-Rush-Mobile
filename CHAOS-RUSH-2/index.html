<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
  />

  <!-- PWA -->
  <meta name="theme-color" content="#1a1a1a" />
  <meta
    name="description"
    content="Um jogo de sobrevivência roguelike com mecânicas de poder"
  />

  <!-- Apple -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  />
  <meta name="apple-mobile-web-app-title" content="Chaos Rush" />

  <!-- Android -->
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Extras -->
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-config" content="none" />

  <title>Chaos Rush</title>

  <!-- CSS -->
  <link rel="stylesheet" href="./css/style.css" />

  <!-- Manifest -->
  <link rel="manifest" href="./manifest.json" />

  <!-- Ícones -->
  <link
    rel="shortcut icon"
    href="./assets/icon-192.png"
    type="image/x-icon"
  />

  <link rel="apple-touch-icon" href="./assets/icon-192.png" />

  <link
    rel="icon"
    type="image/png"
    sizes="192x192"
    href="./assets/icon-192.png"
  />

  <link
    rel="icon"
    type="image/png"
    sizes="512x512"
    href="./assets/icon-512.png"
  />
</head>

<body>

  <!-- GAME -->
  <div id="game-container"></div>

  <!-- ORIENTATION LOCK -->
  <div id="orientation-lock-overlay" class="hidden">
    <div class="orientation-message">
      <h1>Mantenha o celular em retrato</h1>

      <p>
        O jogo funciona apenas no modo retrato.
        Por favor, vire o aparelho para cima.
      </p>
    </div>
  </div>

  <!-- PHASER -->
  <script src="./js/phaser.min.js"></script>

  <!-- MAIN -->
  <script type="module" src="./js/main.js"></script>

  <script>

    // =========================================
    // SERVICE WORKER
    // =========================================

    if ("serviceWorker" in navigator) {

      window.addEventListener("load", () => {

        navigator.serviceWorker
          .register("./service-worker.js")

          .then((reg) => {

            console.log(
              "[PWA] Service Worker registrado:",
              reg
            );

            // Atualização automática
            setInterval(() => {

              reg.update()
                .catch((err) => {

                  console.error(
                    "Erro ao atualizar SW:",
                    err
                  );

                });

            }, 60000);

          })

          .catch((err) => {

            console.error(
              "[PWA] Erro ao registrar SW:",
              err
            );

          });

      });

    }

    // =========================================
    // PREVENIR SCROLL / ZOOM
    // =========================================

    document.addEventListener(
      "touchmove",
      (e) => {

        if (e.target.closest("#game-container")) {
          e.preventDefault();
        }

      },
      { passive: false }
    );

    // Bloquear zoom por duplo toque
    let lastTouchEnd = 0;

    document.addEventListener(
      "touchend",
      (e) => {

        const now = Date.now();

        if (now - lastTouchEnd <= 300) {
          e.preventDefault();
        }

        lastTouchEnd = now;

      },
      false
    );

    // =========================================
    // BLOQUEAR MENU CONTEXTO
    // =========================================

    document.addEventListener(
      "contextmenu",
      (e) => {

        if (e.target.closest("#game-container")) {
          e.preventDefault();
        }

      }
    );

    // =========================================
    // ORIENTATION CHECK
    // =========================================

    const overlay = document.getElementById(
      "orientation-lock-overlay"
    );

    function checkOrientation() {

      const isLandscape =
        window.innerWidth > window.innerHeight;

      if (isLandscape) {

        overlay.classList.remove("hidden");

      } else {

        overlay.classList.add("hidden");

      }

    }

    window.addEventListener(
      "resize",
      checkOrientation
    );

    window.addEventListener(
      "orientationchange",
      checkOrientation
    );

    checkOrientation();

  </script>

</body>

</html>
